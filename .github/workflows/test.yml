name: Tests and Coverage Badge

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main]

jobs:
    test:
        name: Teste com Python 3.11
        runs-on: ubuntu-latest
        env:
            DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
            DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install -r requirements-dev.txt

            - name: Build static files
              run: |
                  python manage.py collectstatic --noinput

            - name: Run tests and collect coverage
              run: pytest website/tests --cov=website

            - name: Generate coverage badge
              run: |
                  pip install "setuptools<81" "coverage-badge==1.1.2"
                  coverage-badge -o coverage.svg -f

            - name: Upload coverage badge artifact
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-badge
                  path: coverage.svg

    update-badge:
        name: Open PR for coverage badge
        needs: test
        runs-on: ubuntu-latest
        if: >-
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main' &&
            github.actor != 'github-actions[bot]'
        steps:
            - uses: actions/checkout@v4

            - name: Download badge artifact
              uses: actions/download-artifact@v4
              with:
                  name: coverage-badge
                  path: .

            # PAT (BADGE_UPDATE_TOKEN) dispara pull_request e reporta "Teste com Python 3.11"
            # no PR — o GITHUB_TOKEN padrão não aciona checks em PRs do bot.
            - name: Create pull request with coverage badge
              uses: peter-evans/create-pull-request@v6
              with:
                  token: ${{ secrets.BADGE_UPDATE_TOKEN }}
                  commit-message: "chore: update coverage badge"
                  branch: "update-coverage-badge-${{ github.run_number }}"
                  title: "Update coverage badge"
                  body: |
                      Atualização automática de `coverage.svg` após testes em `main`.
                      O check **Teste com Python 3.11** deve passar neste PR antes do merge.
                  add-paths: coverage.svg
                  base: main
                  delete-branch: true
