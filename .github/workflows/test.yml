name: Generate Coverage Badge and PR

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main]

jobs:
    test:
        name: Teste com Python 3.11
        runs-on: ubuntu-latest
        env:
            DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
            DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install -r requirements-dev.txt

            - name: Run tests and collect coverage
              run: pytest --cov=website

            - name: Generate coverage badge
              run: |
                  pip install "setuptools<81" "coverage-badge==1.1.2"
                  coverage-badge -o coverage.svg -f

            - name: Upload coverage badge artifact
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-badge
                  path: coverage.svg

    update-badge:
        name: Commit and PR Badge
        needs: test
        runs-on: ubuntu-latest
        if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4

            - name: Download badge artifact
              uses: actions/download-artifact@v4
              with:
                  name: coverage-badge
                  path: .

            - name: Commit and create PR with coverage badge
              uses: peter-evans/create-pull-request@v6
              with:
                  commit-message: "chore: update coverage badge"
                  branch: "update-coverage-badge-${{ github.run_number }}"
                  title: "Update coverage badge"
                  body: "Automated coverage badge update."
                  add-paths: coverage.svg
                  base: main
                  delete-branch: true
