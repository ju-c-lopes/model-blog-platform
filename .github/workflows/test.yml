name: Tests and Coverage Badge

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main]

jobs:
    test:
        name: Teste com Python 3.11
        runs-on: ubuntu-latest
        env:
            DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
            DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install -r requirements-dev.txt

            - name: Run tests and collect coverage
              run: pytest website/tests --cov=website

            - name: Generate coverage badge
              run: |
                  pip install "setuptools<81" "coverage-badge==1.1.2"
                  coverage-badge -o coverage.svg -f

            - name: Upload coverage badge artifact
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-badge
                  path: coverage.svg

    update-badge:
        name: Commit coverage badge
        needs: test
        runs-on: ubuntu-latest
        if: >-
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main' &&
            github.actor != 'github-actions[bot]'
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Download badge artifact
              uses: actions/download-artifact@v4
              with:
                  name: coverage-badge
                  path: .

            - name: Commit and push coverage badge
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add coverage.svg
                  if git diff --staged --quiet; then
                    echo "coverage.svg unchanged"
                  else
                    git commit -m "chore: update coverage badge"
                    git push
                  fi
