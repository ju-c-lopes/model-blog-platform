services:
  python-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: python_app
    env_file:
      - ./.env.compose
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - HOME=/app
      - PYTHONPATH=/app/
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    working_dir: /app
    entrypoint:
      - docker-entrypoint.sh
