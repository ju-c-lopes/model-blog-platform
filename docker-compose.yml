services:
  python-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: python_app
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - HOME=/app
      - PYTHONPATH=/app/
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    command: ["tail", "-f", "/dev/null"]
