<div class="table-form">
    <div class="input-table">
        <div class="input-cols">
            <label for=id_col_table>Colunas</label>
            <input
                type="number"
                name="id_col_table"
                id="id_col_table"
                min="1"
                max="10"
            >
        </div>
        <div class="input-rows">
            <label for=id_row_table>Linhas</label>
            <input
                type="number"
                name="id_row_table"
                id="id_row_table"
                min="1"
                max="20"
            >
        </div>
    </div>
    <button
        type="button"
        class="media-btn insert-tb-btn"
        title="Insert table with specified rows and columns"
    >
        >
    </button>
</div>
