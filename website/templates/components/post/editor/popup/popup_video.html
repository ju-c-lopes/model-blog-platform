<div class="popup-buttons">
    <button
        type="button"
        class="media-btn local-btn"
        title="Add local video file (max 10MB)"
    >
        <i>🎥</i> Add Video File
    </button>

    <button
        type="button"
        class="media-btn youtube-btn"
        title="Add YouTube video by URL"
    >
        <i>📺</i> Add YouTube Video
    </button>

    <div class="youtube-form">
        <input
            type="text"
            id="youtube-url"
            placeholder="Enter YouTube URL"
        />

        <button
            type="button"
            class="media-btn insert-url-btn"
            title="Insert YouTube video from URL"
        >
            >
        </button>
    </div>
</div>
