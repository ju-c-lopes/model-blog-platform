<div id="viewport-debug" class="viewport-debug" aria-label="Ferramenta de viewport">
    <div class="viewport-debug__panel" id="viewport-debug-panel" hidden>
        <div class="viewport-debug__header">
            <span class="viewport-debug__title">Viewport</span>
            <button type="button" class="viewport-debug__close" aria-label="Fechar painel">×</button>
        </div>
        <div class="viewport-debug__content screen-size"></div>
    </div>
    <button
        type="button"
        class="viewport-debug__toggle"
        aria-expanded="false"
        aria-controls="viewport-debug-panel"
        title="Abrir informações de viewport"
    >
        <span class="viewport-debug__toggle-icon" aria-hidden="true">◧</span>
        <span class="viewport-debug__toggle-label">Viewport</span>
    </button>
</div>
